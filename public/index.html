<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DataMorphp — Smart PDF to Excel Converter. Automating Student Data Extraction with Precision." />
  <title>DataMorphp — Smart PDF to Excel Converter</title>

  <!-- Favicon (inline SVG data URI) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%234F46E5'/%3E%3Cstop offset='100%25' stop-color='%237C3AED'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='50%25' y='54%25' dominant-baseline='middle' text-anchor='middle' font-family='Arial,sans-serif' font-weight='bold' font-size='28' fill='white'%3EDM%3C/text%3E%3C/svg%3E" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Stylesheet -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Navbar ─────────────────────────────────────── -->
  <nav class="navbar">
    <div class="navbar__brand">
      <div class="navbar__logo">
        <svg viewBox="0 0 64 64" width="36" height="36">
          <defs>
            <linearGradient id="logoGrad" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#4F46E5"/>
              <stop offset="100%" stop-color="#7C3AED"/>
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="14" fill="url(#logoGrad)"/>
          <text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle"
                font-family="Inter,Arial,sans-serif" font-weight="bold" font-size="28" fill="white">DM</text>
        </svg>
      </div>
      <span class="navbar__name">DataMorphp</span>
    </div>
  </nav>

  <!-- ── Hero Section ───────────────────────────────── -->
  <main class="hero">
    <div class="hero__content">
      <h1 class="hero__title">Smart PDF to Excel Converter</h1>
      <p class="hero__tagline">Automating Student Data Extraction with Precision</p>

      <!-- Upload Card -->
      <div class="card" id="uploadCard">

        <!-- Drop Zone -->
        <div class="dropzone" id="dropzone">
          <div class="dropzone__icon">
            <!-- Upload cloud icon -->
            <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="17 8 12 3 7 8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <p class="dropzone__text">Drag &amp; drop your PDF here</p>
          <p class="dropzone__or">or</p>
          <label class="btn btn--outline" for="fileInput">Browse File</label>
          <input type="file" id="fileInput" accept=".pdf,application/pdf" hidden />
        </div>

        <!-- File Info (visible after selecting a file) -->
        <div class="file-info" id="fileInfo">
          <div class="file-info__icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="1.5"
                 stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="16" y1="13" x2="8" y2="13"/>
              <line x1="16" y1="17" x2="8" y2="17"/>
              <polyline points="10 9 9 9 8 9"/>
            </svg>
          </div>
          <span class="file-info__name" id="fileName">No file selected</span>
          <button class="file-info__remove" id="removeFile" title="Remove file">&times;</button>
        </div>

        <!-- Progress Bar -->
        <div class="progress-wrapper" id="progressWrapper">
          <div class="progress-bar">
            <div class="progress-bar__fill" id="progressFill"></div>
          </div>
          <span class="progress-text" id="progressText">0%</span>
        </div>

        <!-- Convert Button -->
        <button class="btn btn--primary btn--convert" id="convertBtn" disabled>
          <span class="btn__label">Convert to Excel</span>
          <span class="btn__spinner" id="btnSpinner"></span>
        </button>

        <!-- Status Message -->
        <div class="status" id="status"></div>
      </div>
    </div>

    <!-- Decorative floating shapes -->
    <div class="shapes">
      <div class="shape shape--1"></div>
      <div class="shape shape--2"></div>
      <div class="shape shape--3"></div>
    </div>
  </main>

  <!-- ── Footer ─────────────────────────────────────── -->
  <footer class="footer">
    <p>&copy; 2026 <strong>DataMorphp</strong> &mdash; Smart PDF to Excel Converter. All rights reserved.</p>
  </footer>

  <!-- Client-side Script -->
  <script src="script.js"></script>
</body>
</html>
